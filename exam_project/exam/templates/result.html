<!DOCTYPE html>
<html>
<head>
    <title>Grade O Students</title>
</head>
<body>

<h2>Students with Grade O</h2>

<hr>

<table border="1" cellpadding="8">

    <tr>
        <th>Name</th>
        <th>USN</th>
        <th>Grade</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{s.name}}</td>
        <td>{{s.usn}}</td>
        <td>{{s.grade}}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No students found</td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>
</html>
