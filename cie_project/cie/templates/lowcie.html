<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Student with cie < 20</h1>
    <br>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Usn</th>
            <th>Sub_code</th>
            <th>Cie</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{student.name}}</td>
            <td>{{student.usn}}</td>
            <td>{{student.sub_code}}</td>
            <td>{{student.cie}}</td>
        </tr>
        {% empty %}
        <tr > 
            <td colspan="4">No students found</td>
        </tr>
        {% endfor %}
    </table>

    <br><br>
    <a href="/">Go back</a>
</body>
</html>
